services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: reportes_app #PHP lenguaje
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - reportes_network

  nginx:
    image: nginx:alpine
    container_name: Sever nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - reportes_network

  db:
    image: mysql:8.0
    container_name: Db MySQL
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - reportes_network

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: PhpMyAdmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_USER: ${DB_USERNAME}
      PMA_PASSWORD: ${DB_PASSWORD}
    depends_on:
      - db
    networks:
      - reportes_network

networks:
  reportes_network:
    driver: bridge

volumes:
  dbdata:
    driver: local
